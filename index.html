<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flick It!</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖊️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Pangolin&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0;padding:0;box-sizing:border-box; }
  body { background:#222; overflow:hidden; font-family:'Pangolin',cursive; }
  canvas { display:block;transition:filter 0.2s; }
  body.lobby-open canvas { filter:blur(8px); }
  button { font-family:'Noto Sans',sans-serif; }
  h1,h2,h3,#menu h1,#classicSetup h2,.lobby-card h2,.mode-name {
    font-family:'Noto Sans',sans-serif;font-weight:900;letter-spacing:2px;
  }

  #menu {
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:rgba(20,20,20,0.96);z-index:30;
  }
  #menu h1 { font-size:52px;color:#eee;letter-spacing:4px;margin-bottom:6px; }
  #menu .sub { color:#888;font-size:14px;margin-bottom:10px; }
  #menu .inst { color:#aaa;font-size:13px;margin-bottom:38px;text-align:center;line-height:2;max-width:320px; }
  .mode-row { display:flex;gap:18px;margin:18px 0 24px; }
  .mode-card {
    width:180px;padding:18px 16px;border-radius:8px;cursor:pointer;
    background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);
    color:#ddd;text-align:center;transition:transform 0.15s,border-color 0.15s,background 0.15s;
  }
  .mode-card:hover { transform:translateY(-3px);background:rgba(255,255,255,0.09); }
  .mode-card.selected { border-color:#c0392b;background:rgba(192,57,43,0.18); }
  .mode-name { font-size:20px;margin-bottom:7px; }
  .mode-desc { font-size:12px;color:#aaa;line-height:1.5; }
  #menu button,
  #classicSetup button,
  #resetBtn,
  #winScreen button {
    background:#c0392b;color:#fff;border:none;border-radius:50px;
    cursor:pointer;letter-spacing:2px;text-align:center;
    box-shadow:0 4px 20px rgba(192,57,43,0.5);
    transition:transform 0.15s,background 0.15s;
  }
  #menu button { padding:13px 50px;font-size:17px;font-weight:800; }
  #menu button:hover { transform:scale(1.06);background:#d04435; }

  #classicSetup {
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    padding:22px;background:rgba(0,0,0,0.52);z-index:35;
  }
  .lobby-card {
    width:min(480px,92vw);max-height:calc(100vh - 44px);overflow:auto;
    border-radius:18px;background:rgba(18,18,22,0.95);
    border:1px solid rgba(255,255,255,0.12);box-shadow:0 22px 80px rgba(0,0,0,0.55);
    padding:26px;color:#eee;text-align:center;
  }
  #classicSetup h2 { color:#eee;font-size:29px;margin-bottom:8px; }
  #classicSetup .setup-sub { color:#aaa;font-size:13px;margin-bottom:20px;line-height:1.45; }
  .lobby-field {
    width:100%;padding:11px 13px;border-radius:8px;outline:none;margin-bottom:14px;
    font-family:'Pangolin',cursive;font-size:16px;color:#eee;text-align:center;
    background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.16);
  }
  .lobby-field:focus { border-color:rgba(255,255,255,0.38); }
  .color-swatches { display:flex;gap:7px;align-items:center; }
  .swatch {
    width:27px;height:27px;border-radius:50%;cursor:pointer;
    border:2px solid transparent;transition:transform 0.12s,border-color 0.12s;
  }
  .swatch:hover { transform:scale(1.16); }
  .swatch.picked { border-color:#fff;transform:scale(1.1); }
  .swatch.disabled { cursor:not-allowed;opacity:0.26;filter:grayscale(0.85); }
  .swatch.disabled:hover { transform:none; }
  .lobby-swatches { justify-content:center;margin:2px 0 18px;flex-wrap:wrap; }
  .room-code-row { display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0 18px;color:#ddd;font-size:16px; }
  .room-code { color:#fff;font-family:'Noto Sans',sans-serif;font-size:24px;letter-spacing:4px;font-weight:900; }
  .room-status { color:#aaa;font-size:13px;min-height:18px;text-align:center;margin-top:12px; }
  .room-player-list {
    max-height:220px;overflow:auto;margin:10px 0 14px;padding:5px;
    border-radius:10px;background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.08);
  }
  .room-player-row {
    display:flex;align-items:center;gap:9px;background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 11px;margin-bottom:8px;
  }
  .room-player-row:last-child { margin-bottom:0; }
  .room-player-dot { width:14px;height:14px;border-radius:50%;flex-shrink:0; }
  .room-player-name { flex:1;color:#ddd;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  .room-badge {
    color:#eee;font-size:10px;letter-spacing:1px;padding:3px 6px;border-radius:999px;
    background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.12);
  }
  .lobby-choice { display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px; }
  #classicSetup .setup-actions { display:flex;gap:12px;margin-top:18px;align-items:center;justify-content:center;flex-wrap:wrap; }
  #classicSetup button { padding:10px 24px;font-size:14px;font-weight:800;box-shadow:0 4px 16px rgba(192,57,43,0.35); }
  #classicSetup .soft-btn { background:rgba(255,255,255,0.09);box-shadow:none;color:#ddd; }
  #classicSetup .join-btn { background:#1a7a4a;box-shadow:0 4px 16px rgba(26,122,74,0.35); }
  #classicSetup .join-btn:hover { background:#20955a; }
  #classicSetup .start-btn { background:#1a5fa8;box-shadow:0 4px 16px rgba(26,95,168,0.35); }
  #classicSetup .start-btn:hover { background:#2474c7; }
  #classicSetup button:disabled { opacity:0.38;cursor:not-allowed;transform:none;background:#7d3029; }
  #classicSetup button:disabled:hover { opacity:0.38;transform:none;background:#7d3029; }
  #classicSetup button:hover { transform:scale(1.04);background:#d04435; }
  #classicSetup .soft-btn:hover { background:rgba(255,255,255,0.16); }
  .waiting-ellipsis::after { content:'';animation:ellipsis 1.2s steps(4,end) infinite; }
  @keyframes ellipsis {
    0% { content:''; }
    25% { content:'.'; }
    50% { content:'..'; }
    75%,100% { content:'...'; }
  }
  @keyframes slideUp {
    from { opacity:0;transform:translateY(24px); }
    to { opacity:1;transform:translateY(0); }
  }
  .lobby-card { animation:slideUp 0.25s ease; }

  #hud {
    position:fixed;top:0;left:0;right:0;height:64px;
    display:none;align-items:center;justify-content:space-between;
    padding:0 24px;z-index:20;pointer-events:none;
  }
  .score-panel {
    display:flex;align-items:center;gap:12px;
    background:rgba(0,0,0,0.45);border-radius:12px;
    padding:8px 20px;border:2px solid transparent;
    transition:border-color 0.3s,box-shadow 0.3s;
  }
  .score-panel.active-panel {
    border-color:currentColor;
    box-shadow:0 0 18px -4px currentColor;
  }
  .score-dot  { width:14px;height:14px;border-radius:50%; }
  .score-name { font-size:13px;font-weight:700;letter-spacing:1px; }
  .score-num  { font-size:28px;font-weight:900; }

  #turnBanner {
    display:flex;align-items:center;gap:10px;
    background:rgba(0,0,0,0.5);border-radius:10px;padding:8px 20px;
  }
  #turnBanner.turn-pulse { animation:turnPulse 1.5s ease; }
  @keyframes turnPulse {
    0% { box-shadow:0 0 0 rgba(255,255,255,0); }
    35% { box-shadow:0 0 22px var(--turn-color, rgba(255,255,255,0.45)); }
    100% { box-shadow:0 0 0 rgba(255,255,255,0); }
  }
  #turnDot  { width:16px;height:16px;border-radius:50%;transition:background 0.3s; }
  #turnText { font-size:13px;font-weight:700;color:#eee;letter-spacing:1px; }
  #turnTimer {
    min-width:26px;text-align:center;color:#ddd;font-size:13px;font-weight:900;
    background:rgba(255,255,255,0.1);border-radius:8px;padding:2px 6px;
  }

  #resetBtn {
    position:fixed;bottom:18px;right:24px;
    padding:8px 28px;font-size:13px;font-weight:700;
    display:none;z-index:20;pointer-events:all;
  }
  #resetBtn:hover { transform:scale(1.06);background:#d04435; }

  #cubeOption {
    position:fixed;top:76px;right:24px;display:none;align-items:center;gap:9px;
    padding:8px 13px;border-radius:10px;background:rgba(0,0,0,0.48);
    color:#eee;font-size:13px;font-weight:700;letter-spacing:1px;z-index:22;
    border:1px solid rgba(255,255,255,0.14);pointer-events:all;
  }
  body.classic-game #cubeOption { right:236px; }
  #cubeOption input { width:16px;height:16px;accent-color:#c0392b;cursor:pointer; }

  #playerSidebar {
    position:fixed;right:0;top:64px;bottom:0;width:198px;display:none;
    background:rgba(0,0,0,0.55);border-left:1px solid rgba(255,255,255,0.08);
    padding:14px 10px;z-index:18;overflow:auto;
  }
  #playerSidebar h3 {
    color:#888;font-size:11px;letter-spacing:2px;text-align:center;
    text-transform:uppercase;margin-bottom:12px;
  }
  .player-list-row {
    display:flex;align-items:center;gap:8px;padding:8px 9px;margin-bottom:7px;
    border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
    transition:opacity 0.25s,filter 0.25s,background 0.25s,border-color 0.25s;
  }
  .player-list-row.active { background:rgba(255,255,255,0.16);border-color:rgba(255,255,255,0.28);border-left-width:3px; }
  .player-list-row.eliminated { opacity:0.35;filter:grayscale(1); }
  .player-dot { width:11px;height:11px;border-radius:50%;flex-shrink:0; }
  .player-name { flex:1;color:#ddd;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  .player-count { color:#aaa;font-size:12px; }

  #chatPanel {
    position:fixed;left:0;top:64px;bottom:0;width:230px;display:none;
    background:rgba(0,0,0,0.55);border-right:1px solid rgba(255,255,255,0.08);
    padding:12px 10px;z-index:18;pointer-events:all;
  }
  #chatPanel h3 {
    color:#888;font-size:11px;letter-spacing:2px;text-align:center;
    text-transform:uppercase;margin-bottom:10px;
  }
  #chatMessages {
    height:calc(100% - 132px);overflow-y:auto;padding-right:3px;
    display:flex;flex-direction:column;gap:7px;
  }
  .chat-message {
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
    border-radius:8px;padding:7px 8px;
  }
  .chat-author { font-size:11px;font-weight:900;letter-spacing:1px;margin-bottom:3px; }
  .chat-text { color:#ddd;font-size:13px;line-height:1.35;word-break:break-word; }
  #emojiBar { display:flex;gap:7px;justify-content:center;margin:10px 0; }
  #emojiBar button {
    width:34px;height:32px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.08);cursor:pointer;font-size:18px;
    transition:transform 0.12s,background 0.12s;
  }
  #emojiBar button:hover { transform:translateY(-2px);background:rgba(255,255,255,0.16); }
  #chatInputRow { display:flex;gap:6px; }
  #chatInput {
    min-width:0;flex:1;border-radius:8px;border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.08);color:#eee;font-family:'Pangolin',cursive;
    font-size:13px;padding:8px 9px;outline:none;
  }
  #chatInput:focus { border-color:rgba(255,255,255,0.35); }
  #chatSend {
    width:42px;border-radius:8px;border:none;background:#c0392b;color:#fff;
    font-size:18px;font-weight:900;cursor:pointer;
  }
  #reactionLayer {
    position:fixed;inset:0;z-index:24;pointer-events:none;overflow:hidden;
  }
  .floating-reaction {
    position:absolute;font-size:40px;filter:drop-shadow(0 5px 8px rgba(0,0,0,0.45));
    animation:floatReaction 1.45s ease-out forwards;
  }
  @keyframes floatReaction {
    0% { transform:translate(-50%, 16px) scale(0.65) rotate(-8deg);opacity:0; }
    18% { opacity:1; }
    100% { transform:translate(-50%, -96px) scale(1.22) rotate(10deg);opacity:0; }
  }

  #winScreen {
    position:fixed;inset:0;display:none;
    flex-direction:column;align-items:center;justify-content:center;
    background:rgba(10,10,10,0.92);z-index:40;
  }
  #winScreen h2 { font-size:44px;font-weight:900;color:#eee;margin-bottom:10px; }
  #winScreen p  { font-size:17px;color:#aaa;margin-bottom:32px; }
  #winScreen button { padding:12px 44px;font-size:16px;font-weight:800; }
  #winScreen button:hover { transform:scale(1.06);background:#d04435; }

  /* ── MOBILE OVERLAY TOGGLE BUTTONS ─────────────────────────────────────── */
  .panel-fab {
    display:none;position:fixed;z-index:26;
    width:44px;height:44px;border-radius:50%;
    border:1px solid rgba(255,255,255,0.18);
    background:rgba(12,12,14,0.88);color:#eee;
    font-size:20px;cursor:pointer;
    align-items:center;justify-content:center;
    box-shadow:0 2px 14px rgba(0,0,0,0.55);
    transition:background 0.15s,border-color 0.15s;
    pointer-events:all;
  }
  .panel-fab.panel-open { background:rgba(192,57,43,0.82);border-color:#c0392b; }
  #chatToggleBtn  { bottom:18px;left:10px; }
  #playersToggleBtn { top:70px;right:10px; }

  /* ── MOBILE RESPONSIVE ─────────────────────────────────────────────────── */
  @media (max-width:700px) {
    .panel-fab { display:flex; }
    .mobile-hidden { display:none !important; }

    /* HUD */
    #hud { height:50px;padding:0 8px; }
    .score-panel { padding:5px 10px;border-radius:8px; }
    .score-dot { width:10px;height:10px; }
    .score-name { font-size:10px;letter-spacing:0; }
    .score-num { font-size:18px; }
    #turnBanner { padding:5px 10px;gap:6px; }
    #turnDot { width:12px;height:12px; }
    #turnText { font-size:10px;letter-spacing:0; }
    #turnTimer { font-size:10px;padding:1px 4px; }

    /* Panels: slide-over overlay, narrower */
    #chatPanel {
      width:min(260px,82vw);top:50px;bottom:0;
      display:flex;flex-direction:column;
      padding-bottom:70px;
      box-shadow:4px 0 24px rgba(0,0,0,0.55);
    }
    #chatMessages { flex:1;height:auto;min-height:0; }
    #playerSidebar {
      width:min(220px,72vw);top:50px;bottom:0;
      box-shadow:-4px 0 24px rgba(0,0,0,0.55);
    }

    /* Panel backdrop — tapping it closes open panel */
    #panelBackdrop {
      display:none;position:fixed;inset:0;z-index:17;
      background:rgba(0,0,0,0.42);
    }
    #panelBackdrop.active { display:block; }

    /* Hide cube option on mobile (server doesn't handle cubes) */
    #cubeOption { display:none !important; }

    /* Hide floating New Game on mobile — it lives inside the sidebar instead */
    #resetBtn { display:none !important; }

    /* Canvas: no accidental scroll/zoom */
    canvas { touch-action:none; }

    /* Menu */
    #menu h1 { font-size:34px;letter-spacing:2px; }
    #menu .inst { font-size:12px;margin-bottom:24px; }
    .mode-row { flex-direction:column;gap:10px; }
    .mode-card { width:min(260px,88vw); }
    #menu button { padding:11px 36px;font-size:15px; }

    /* Lobby card */
    .lobby-card { padding:20px 14px;border-radius:14px; }
    #classicSetup h2 { font-size:20px;letter-spacing:1px;margin-bottom:6px; }
    #classicSetup .setup-sub { font-size:12px;margin-bottom:14px; }

    /* Room code row: stack buttons below code */
    .room-code-row {
      flex-wrap:wrap;gap:6px;margin:8px 0 10px;
      justify-content:center;
    }
    .room-code { font-size:18px;letter-spacing:2px; }
    .room-code-row .soft-btn { padding:5px 12px;font-size:11px;letter-spacing:0; }

    /* Lobby action buttons: full-width stacked */
    #classicSetup .setup-actions { flex-direction:column;align-items:center;gap:8px;margin-top:14px; }
    #classicSetup button { width:100%;max-width:280px;padding:10px 16px;font-size:13px; }

    /* Lobby choice grid: single column */
    .lobby-choice { grid-template-columns:1fr;gap:8px; }

    /* Player list */
    .room-player-list { max-height:160px; }

    /* Win screen */
    #winScreen h2 { font-size:30px; }
    #winScreen p { font-size:14px; }
    #winScreen button { padding:10px 32px;font-size:14px; }

    /* cubeOption hidden entirely on mobile via rule above */
  }
</style>
</head>
<body>

<div id="menu">
  <h1>FLICK IT!</h1>
  <div class="sub">Choose Game Mode</div>
  <div class="inst">
    Battle uses mixed pen weights.<br>
    Classic uses equal pen 3 colours for everyone.
  </div>
  <div class="mode-row">
    <div class="mode-card selected" id="modeBattle" onclick="selectMode('battle')">
      <div class="mode-name">⚔️ BATTLE</div>
      <div class="mode-desc">Black vs Blue<br>different pen weights</div>
    </div>
    <div class="mode-card" id="modeClassic" onclick="selectMode('classic')">
      <div class="mode-name">🖊️ CLASSIC</div>
      <div class="mode-desc">2-5 players<br>same pen, different colours</div>
    </div>
  </div>
  <button onclick="handlePlay()">PLAY</button>
</div>

<div id="classicSetup">
  <div class="lobby-card" id="lobbyCard"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="score-panel" id="panelBlack" style="color:#dddddd;">
    <div class="score-dot" style="background:#111;"></div>
    <div class="score-name" id="scoreNameBlack" style="color:#dddddd;">BLACK</div>
    <div class="score-num" id="scoreBlack" style="color:#dddddd;">0</div>
  </div>
  <div id="turnBanner">
    <div id="turnDot"></div>
    <div id="turnText">BLACK'S TURN</div>
    <div id="turnTimer">10</div>
  </div>
  <div class="score-panel" id="panelBlue" style="color:#5588cc;">
    <div class="score-num" id="scoreBlue" style="color:#5588cc;">0</div>
    <div class="score-name" id="scoreNameBlue" style="color:#5588cc;">BLUE</div>
    <div class="score-dot" style="background:#2980b9;"></div>
  </div>
</div>

<button id="resetBtn" onclick="resetGame()">New Game</button>

<label id="cubeOption">
  <input id="cubeToggle" type="checkbox" onchange="toggleCubes()">
  CUBES
</label>

<div id="playerSidebar">
  <h3>Players</h3>
  <div id="playerList"></div>
  <button id="sidebarNewGameBtn" onclick="resetGame()" style="display:none;width:100%;margin-top:14px;padding:9px 0;font-size:13px;font-weight:800;border-radius:50px;border:none;background:#c0392b;color:#fff;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 14px rgba(192,57,43,0.4);">New Game</button>
</div>

<div id="chatPanel">
  <h3>Room Chat</h3>
  <div id="chatMessages"></div>
  <div id="emojiBar">
    <button onclick="sendReaction('😢')" title="Sad">😢</button>
    <button onclick="sendReaction('😡')" title="Angry">😡</button>
    <button onclick="sendReaction('😂')" title="Laughing">😂</button>
  </div>
  <div id="chatInputRow">
    <input id="chatInput" maxlength="80" placeholder="Type message" onkeydown="handleChatKey(event)">
    <button id="chatSend" onclick="sendChatMessage()">➤</button>
  </div>
</div>

<div id="reactionLayer"></div>
<div id="panelBackdrop" onclick="closeAllPanels()"></div>

<button class="panel-fab" id="chatToggleBtn" onclick="toggleChatPanel()" title="Chat">💬</button>
<button class="panel-fab" id="playersToggleBtn" onclick="togglePlayersPanel()" title="Players">☰</button>

<div id="winScreen">
  <h2 id="winTitle">BLACK WINS!</h2>
  <p  id="winMsg">Black: 5 — Blue: 5</p>
  <button onclick="resetGame()">Play Again</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const HALF_LEN   = 100;
const HALF_W     = 5;
const MAX_DRAG   = 140;
const TURN_IDLE_LIMIT = 10000;
const FRICTION   = 0.87;
const STICKS_PER = 4;
const CLASSIC_PENS_PER_PLAYER = 3;
const CUBE_COUNT = 5;
const CUBE_SIZE  = 34;

// How many collision resolution iterations per frame — more = no phasing
const COLLISION_ITERS = 8;

const BLACK_COL   = '#111111';
const BLACK_LIGHT = '#dddddd';
const BLUE_COL    = '#3a6fa8';
const BLUE_LIGHT  = '#5a8fc8';

const PEN_FILES = {
  black: ['3black.png','4black.png','5black.png','2black.png'],
  blue:  ['3blue.png', '4blue.png', '5blue.png', '2blue.png']
};

const CLASSIC_COLORS = [

// ── PRELOAD ───────────────────────────────────────────────────────────────────
function preload() {

function trimTransparentImage(img) {
  img.loadPixels();
  let minX = img.width, minY = img.height, maxX = -1, maxY = -1;
  for (let y = 0; y < img.height; y++) {
    for (let x = 0; x < img.width; x++) {
      if (img.pixels[(y * img.width + x) * 4 + 3] > 8) {
        minX = min(minX, x); minY = min(minY, y);
        maxX = max(maxX, x); maxY = max(maxY, y);
      }
    }
  }
  if (maxX < minX || maxY < minY) return img;
  return img.get(minX, minY, maxX - minX + 1, maxY - minY + 1);
}

// ── SETUP ─────────────────────────────────────────────────────────────────────
function setup() {
  for (let team in penImgs) {
    penImgs[team] = penImgs[team].map(trimTransparentImage);
  }

function computePlat() {
  let mob    = width <= 700;
  let hudH   = mob ? 50 : 64;
  let margin = mob ? 4  : 14;
  let availW = width  - margin * 2;
  let availH = height - hudH - margin * 2;

  // Fit the 880×600 reference into the available area; cap scale on desktop
  let maxSc = mob ? 2.0 : 1.3;
  viewScale = min(availW / REF_W, availH / REF_H, maxSc);

  // Platform is EXACTLY the scaled reference — no wasted empty space
  platW = REF_W * viewScale;
  platH = REF_H * viewScale;
  platX = (width  - platW) / 2;
  platY = hudH + margin + (availH - platH) / 2;

  // No centering offset needed inside plat — reference (0,0) maps to (platX, platY)
  refOffX = 0;
  refOffY = 0;
}

function refToScreen(rx, ry) {
  return { x: platX + refOffX + rx * viewScale, y: platY + refOffY + ry * viewScale };
}
function screenToRef(sx, sy) {
  return { x: (sx - platX - refOffX) / viewScale, y: (sy - platY - refOffY) / viewScale };
}

function beginClassicFromRoom(room) {
  roomState = room;
  classicPlayers = room.players.map((p, i) => {
    let color = CLASSIC_COLORS.find(c => c.id === p.colorId) || CLASSIC_COLORS[i];
    return {
      team: 'classic' + i,
      id: p.id,
      name: p.name,
      colorId: color.id,
      hex: color.hex,
      light: color.light,
      file: color.file,
      eliminated: !!(room.eliminatedPlayerIds && room.eliminatedPlayerIds.includes(p.id))
    };
  });
  startClassicGame(true);
  // Sticks come from server via 'start' or 'gamestate' SSE events
}

function connectRoomEvents(roomId) {
  if (location.protocol === 'file:' || typeof EventSource === 'undefined') return;
  if (roomEvents) roomEvents.close();
  roomEvents = new EventSource('/events?room=' + roomId);

  roomEvents.addEventListener('room', event => {
    try {
      roomState = JSON.parse(event.data);
      syncLobbySnapshot();
      applyRoomTurnState();
      renderClassicSetup();
      if (roomState.started && gameState !== 'play') beginRoomGame(roomState);
    } catch (err) {}
  });

  roomEvents.addEventListener('start', event => {
    try {
      let data = JSON.parse(event.data);
      let room = data.room || data;
      if (gameState !== 'play') beginRoomGame(room);
      if (data.sticks && data.sticks.length) applyServerState(data.sticks);
    } catch (err) {}
  });

  roomEvents.addEventListener('gamestate', event => {
    try {
      if (gameState !== 'play') return;
      let data = JSON.parse(event.data);
      applyServerState(data.sticks);
      if (data.scores) scores = data.scores;
      if (data.eliminatedPlayerIds && roomState) roomState.eliminatedPlayerIds = data.eliminatedPlayerIds;
      if (data.currentTurnId && data.currentTurnId !== currentTurnPlayerId) {
        currentTurnPlayerId = data.currentTurnId;
        currentTurnStartedAt = data.currentTurnStartedAt || currentTurnStartedAt;
        if (roomState) {
          roomState.currentTurnId = data.currentTurnId;
          roomState.currentTurnStartedAt = data.currentTurnStartedAt;
        }
        applyRoomTurnState();
      }
    } catch (err) {}
  });

  roomEvents.addEventListener('turn', event => {
    try {
      let data = JSON.parse(event.data);
      currentTurnPlayerId = data.currentTurnId;
      currentTurnStartedAt = data.currentTurnStartedAt || Date.now();
      if (roomState) {
        roomState.currentTurnId = data.currentTurnId;
        roomState.currentTurnStartedAt = data.currentTurnStartedAt;
      }
      applyRoomTurnState();
    } catch (err) {}
  });

  roomEvents.addEventListener('winner', event => {
    try {
      let data = JSON.parse(event.data);
      if (data.sticks && data.sticks.length) applyServerState(data.sticks);
      pendingWinner = data.winner;
      pendingLeft = data.leftCounts || {};
      // For classic mode, map leftCounts (keyed by playerId) to team keys
      if (gameMode === 'classic') {
        let mapped = {};
        classicPlayers.forEach(p => {
          mapped[p.team] = data.leftCounts ? (data.leftCounts[p.id] || 0) : 0;
        });
        pendingLeft = mapped;
      }
      selected = null; dragStart = null;
      gameState = 'ending';
    } catch (err) {}
  });

  roomEvents.addEventListener('history', event => {
    try {
      chatMessages = JSON.parse(event.data) || [];
      renderChatMessages();
    } catch (err) {}
  });
  roomEvents.addEventListener('chat', event => {
    try { addChatMessage(JSON.parse(event.data)); } catch (err) {}
  });
  roomEvents.addEventListener('reaction', event => {
    try {
      let msg = JSON.parse(event.data);
      addChatMessage(msg);
      spawnFloatingReaction(msg.text);
    } catch (err) {}
  });
}

async function openRoomFromUrl() {
  let id = new URLSearchParams(location.search).get('room');
  if (!id) return;
  selectedMode = 'classic';
  activeRoomId = id.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
  roomCode = activeRoomId;
  pendingJoinCode = activeRoomId;
  document.body.classList.add('lobby-open');
  document.getElementById('menu').style.display = 'none';
  document.getElementById('classicSetup').style.display = 'flex';
  connectRoomEvents(activeRoomId);
  try {
    let res = await fetch('/api/rooms/' + activeRoomId);
    let room = await res.json();
    roomState = room;
    selectedMode = room.mode || 'classic';
    // If we already have a player ID saved and it's in this room, auto-rejoin
    let ourPlayer = localPlayerId ? room.players.find(p => p.id === localPlayerId) : null;
    if (ourPlayer) {
      myName = ourPlayer.name;
      let chosen = CLASSIC_COLORS.find(c => c.id === ourPlayer.colorId) || CLASSIC_COLORS[0];
      myColor = chosen.light || chosen.hex;
      selectedJoinColor = ourPlayer.colorId;
      isHost = room.hostId === localPlayerId;
      if (room.started) {
        document.body.classList.remove('lobby-open');
        if (gameState !== 'play') beginRoomGame(room);
        return;
      }
      lobbyState = isHost ? 'lobby-host' : 'lobby-guest';
      renderClassicSetup();
      return;
    }
    selectedJoinColor = firstOpenColor();
    lobbyState = 'setup-join-name';
    renderClassicSetup();
  } catch (err) {
    updateRoomStatus('Could not load room');
  }
}

function roomUrl(id) {
  let origin = location.origin && location.origin !== 'null' ? location.origin : 'https://yourdomain.com';
  return origin + location.pathname + '?room=' + id;
}

async function copyLobbyText(text, button) {
  if (!text) return;
  let original = button ? button.innerText : '';
  try {
    await navigator.clipboard.writeText(text);
    updateRoomStatus('Copied!');
  } catch (err) {
    updateRoomStatus(text);
  }
  if (button) button.innerText = 'Copied!';
  clearTimeout(copiedTimer);
  copiedTimer = setTimeout(() => {
    updateRoomStatus('');
    if (button) button.innerText = original;
  }, 1500);
}

function updateRoomStatus(text) {
  let status = document.getElementById('roomStatus');
  if (status) status.innerText = text || '';
}

function syncLobbySnapshot() {
  roomCode = activeRoomId || (roomState && roomState.id) || roomCode;
  playersList = roomState && Array.isArray(roomState.players) ? roomState.players.slice() : [];
  if (roomState && roomState.currentTurnId) currentTurnPlayerId = roomState.currentTurnId;
  if (roomState && roomState.currentTurnStartedAt) currentTurnStartedAt = roomState.currentTurnStartedAt;
  isHost = !!(roomState && roomState.hostId && roomState.hostId === localPlayerId);
  if ((lobbyState === 'lobby-host' || lobbyState === 'lobby-guest') && roomState) {
    lobbyState = isHost ? 'lobby-host' : 'lobby-guest';
  }
}

function applyRoomTurnState() {
  if (!roomState || gameState !== 'play') return;
  if (roomState.currentTurnId) {
    currentTurnPlayerId = roomState.currentTurnId;
    if (gameMode === 'classic') {
      let idx = classicPlayers.findIndex(p => p.id === currentTurnPlayerId);
      if (idx >= 0) {
        classicTurnIndex = idx;
        currentTurn = classicPlayers[idx].team;
      }
    } else if (roomState.players && roomState.players.length >= 2) {
      currentTurn = roomState.players[0].id === currentTurnPlayerId ? 'black' : 'blue';
    }
  }
  if (roomState.currentTurnStartedAt) currentTurnStartedAt = roomState.currentTurnStartedAt;
  if (roomState.cubeAvailable === false) {
    firstMoveDone = true;
    persistRoomCubeSpent();
    let cubeOption = document.getElementById('cubeOption');
    if (cubeOption) cubeOption.style.display = 'none';
  }
  updateHUD();
  updateTurnTimer();
}

function firstOpenColor() {
  let taken = roomState ? roomState.players.map(p => p.colorId) : [];
  let open = CLASSIC_COLORS.find(c => !taken.includes(c.id));
  return open ? open.id : CLASSIC_COLORS[0].id;
}

    return `<div class="room-player-row">
      <div class="room-player-dot" style="background:${color.hex}"></div>
      <div class="room-player-name">${escapeHtml(player.name)}</div>
      ${youBadge}${hostBadge}
    </div>`;
  }).join('') || '<div class="setup-sub waiting-ellipsis">Waiting for players</div>';
  let hostControls = isHost
    ? `<button class="start-btn" onclick="startRoomGame()" ${playersList.length >= 2 ? '' : 'disabled'}>Start Game ▶</button>`
    : '<div class="setup-sub">Waiting for host to start...</div>';
  card.innerHTML = `
    <h2>WAITING FOR PLAYERS</h2>
    <div class="room-code-row">
      <span>Room Code:</span>
      <span class="room-code">${escapeHtml(roomCode)}</span>
      <button class="soft-btn" onclick="copyRoomCode(this)">Copy Code</button>
      <button class="soft-btn" onclick="copyRoomLink(this)">Copy Link</button>
    </div>
    <div class="setup-sub" style="margin-bottom:6px;text-align:left;">Players:</div>
    <div class="room-player-list">${playersHtml}</div>
    <div class="setup-sub">${playersList.length}/5 players ready</div>
    <div class="setup-actions">
      ${hostControls}
      <button class="soft-btn" onclick="leaveRoom()">Leave Room</button>
    </div>
    <div id="roomStatus" class="room-status"></div>`;
}

function escapeHtml(text) {
  return String(text).replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[ch]));
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function initGame() {
  sticks        = [];
  obstacles     = [];
  particles     = [];
  selected      = null;
  dragStart     = null;
  if (gameMode === 'battle') {
    scores      = { black: 0, blue: 0 };
    currentTurn = 'black';
    currentTurnPlayerId = roomState && roomState.currentTurnId ? roomState.currentTurnId
      : roomState && roomState.players && roomState.players[0] ? roomState.players[0].id : '';
    if (roomState && roomState.players && roomState.players[1] && roomState.players[1].id === currentTurnPlayerId) {
      currentTurn = 'blue';
    }
    pendingLeft = { black: STICKS_PER, blue: STICKS_PER };
  } else {
    classicPlayers.forEach(p => p.eliminated = false);
    classicTurnIndex = roomState && roomState.currentTurnId ? classicPlayers.findIndex(p => p.id === roomState.currentTurnId) : 0;
    if (classicTurnIndex < 0) classicTurnIndex = 0;
    currentTurn = classicPlayers[classicTurnIndex] ? classicPlayers[classicTurnIndex].team : '';
    currentTurnPlayerId = classicPlayers[classicTurnIndex] ? classicPlayers[classicTurnIndex].id || '' : '';
    pendingLeft = {};
  }
  pendingWinner = null;
  firstMoveDone = isRoomCubeSpent();
  lastTurnPulseKey = '';

  // Sticks are placed by the server and arrive via 'gamestate' SSE — no local placement

  let cubeToggle = document.getElementById('cubeToggle');
  cubeToggle.checked = false;
  document.getElementById('cubeOption').style.display = firstMoveDone ? 'none' : 'flex';
  document.getElementById('winScreen').style.display   = 'none';
  document.getElementById('playerSidebar').style.display = gameMode === 'classic' ? 'block' : 'none';
  document.getElementById('chatPanel').style.display = 'block';
  updateHUD();
  if (activeRoomId && currentTurnStartedAt) {
    turnStartedAt = millis() - (Date.now() - currentTurnStartedAt);
    turnTouched = false;
    updateTurnTimer();
  } else {
    startTurnTimer();
  }
  renderChatMessages();
}


function toggleCubes() {
  if (gameState !== 'play' || firstMoveDone) return;
  obstacles = document.getElementById('cubeToggle').checked ? makeObstacles() : [];
}

function hideCubeOption() {
  firstMoveDone = true;
  persistRoomCubeSpent();
  document.getElementById('cubeOption').style.display = 'none';
}

function roomCubeKey() {
  return activeRoomId ? 'flickItCubeSpent:' + activeRoomId : '';
}

function isRoomCubeSpent() {
  if (roomState && roomState.cubeAvailable === false) return true;
  let key = roomCubeKey();
  return !!key && sessionStorage.getItem(key) === '1';
}

function persistRoomCubeSpent() {
  let key = roomCubeKey();
  if (key) sessionStorage.setItem(key, '1');
}

function makeObstacles() {
  let blocks = [], tries = 0;
  while (blocks.length < CUBE_COUNT && tries < 1500) {
    tries++;
    let size = random(CUBE_SIZE * 0.85, CUBE_SIZE * 1.15);
    let x    = random(platX + size, platX + platW - size);
    let y    = random(platY + size, platY + platH - size);
    let ok   = true;

    for (let s of sticks) {
      if (ptSegDist(x, y, s.ax, s.ay, s.bx, s.by) < size * 1.25) { ok=false; break; }
    }
    for (let b of blocks) {
      if (dist(x,y,b.x,b.y) < (size + b.size) * 1.05) { ok=false; break; }
    }
    if (ok) blocks.push(new Obstacle(x, y, size));
  }
  return blocks;
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw() {
  background(32, 32, 32);
  drawPlatform();

  if (gameState !== 'play' && gameState !== 'ending') return;
  updateTurnTimer();

  for (let o of obstacles) o.show();

  for (let i = particles.length-1; i >= 0; i--) {
    particles[i].update(); particles[i].show();
    if (particles[i].dead()) particles.splice(i,1);
  }

  // Trails are purely visual — update client-side only
  for (let s of sticks) s.updateTrail();

  let falling    = sticks.filter(s => s.gone);
  let notFalling = sticks.filter(s => !s.gone);
  for (let s of notFalling) s.show();
  for (let s of falling)    s.show();

  if (gameState === 'play' && selected && dragStart) {
    let pull = p5.Vector.sub(dragStart, createVector(mouseX, mouseY));
    if (pull.mag() > MAX_DRAG) pull.setMag(MAX_DRAG);
    if (pull.mag() > 6) drawArrow(dragStart, pull);
  }

  if (gameState === 'ending') checkPendingWin();
}

function drawPlatform() {
  fill(195, 168, 128);
  noStroke();
  rect(platX, platY, platW, platH);

  stroke(170, 145, 105, 55);
  strokeWeight(1);
  for (let y = platY+10; y < platY+platH; y += 20) {
    line(platX, y + sin(y*0.08)*3, platX+platW, y + sin(y*0.08)*3);
  }

  noFill();
  stroke(255, 255, 255, 200);
  strokeWeight(3);
  rect(platX, platY, platW, platH);

  stroke(255, 255, 255, 40);
  strokeWeight(8);
  rect(platX, platY, platW, platH);
}

function drawArrow(origin, pull) {
  let fwd = pull.copy();
  push();
  translate(origin.x, origin.y);

  drawingContext.setLineDash([5, 6]);
  stroke(255, 255, 255, 35);
  strokeWeight(2);
  line(0, 0, -fwd.x, -fwd.y);
  drawingContext.setLineDash([]);

  stroke(255, 255, 255, 38);
  strokeWeight(7);
  line(0, 0, fwd.x, fwd.y);

  translate(fwd.x, fwd.y);
  rotate(fwd.heading());
  fill(255, 255, 255, 38);
  noStroke();
  let hs = 14 + (pull.mag() / MAX_DRAG) * 12;
  triangle(hs, 0, -hs*0.55, hs*0.5, -hs*0.55, -hs*0.5);
  pop();
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
function mousePressed() {
  if (gameState !== 'play') return;
  if (!canLocalControlTurn()) return;
  for (let i = 0; i < sticks.length; i++) {
    let s = sticks[i];
    if (!s.gone && s.team === currentTurn && s.hit(mouseX, mouseY)) {
      selected  = s;
      dragStart = createVector(mouseX, mouseY);
      markTurnTouched();
      break;
    }
  }
}

function canLocalControlTurn() {
  if (!activeRoomId || !localPlayerId) return true;
  if (gameMode === 'classic') {
    let player = classicPlayers[classicTurnIndex];
    return !!player && (currentTurnPlayerId || player.id) === localPlayerId;
  }
  if (gameMode === 'battle' && roomState && roomState.players && roomState.players.length >= 2) {
    let activePlayer = currentTurn === 'black' ? roomState.players[0] : roomState.players[1];
    return !!activePlayer && activePlayer.id === localPlayerId;
  }
  return true;
}

function mouseReleased() {
  if (gameState !== 'play' || !selected || !dragStart) return;

  let pull = p5.Vector.sub(dragStart, createVector(mouseX, mouseY));
  if (pull.mag() > MAX_DRAG) pull.setMag(MAX_DRAG);

  if (pull.mag() > 8) {
    let pwr     = pow(pull.mag() / MAX_DRAG, 1.1);
    let clickPt = dragStart.copy();
    let offset  = p5.Vector.sub(clickPt, selected.pos);

    let hl = HALF_LEN * viewScale;
    let perpAng  = selected.angle + HALF_PI;
    let perp     = createVector(cos(perpAng), sin(perpAng));
    let leverage = constrain(p5.Vector.dot(offset, perp) / hl, -1, 1);

    let axisDir = createVector(cos(selected.angle), sin(selected.angle));
    let axisOff = p5.Vector.dot(offset, axisDir) / hl;

    // Convert screen-space force to reference-space force for server
    let force = pull.copy().setMag(pwr * 22);
    let fx = force.x / viewScale;
    let fy = force.y / viewScale;

    let idx = sticks.indexOf(selected);
    playFlickSound(pwr);
    spawnParticles(clickPt.x, clickPt.y, pull, selected.team);
    hideCubeOption();
    sendFlick(idx, fx, fy, leverage, axisOff);
  }

  selected  = null;
  dragStart = null;
}

async function sendFlick(stickIndex, fx, fy, leverage, axisOff) {
  if (!activeRoomId || !localPlayerId || location.protocol === 'file:') return;
  try {
    await fetch('/api/rooms/' + activeRoomId + '/flick', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ playerId: localPlayerId, stickIndex, fx, fy, leverage, axisOff })
    });
  } catch (err) {}
}

function touchStarted(event) {
  if (event && event.target && event.target.tagName !== 'CANVAS') return true;
  mousePressed();
  return false;
}

function touchEnded(event) {
  if (event && event.target && event.target.tagName !== 'CANVAS') return true;
  mouseReleased();
  return false;
}


function startTurnTimer() {
  turnStartedAt = millis();
  currentTurnStartedAt = Date.now();
  turnTouched = false;
  updateTurnTimer();
}

function markTurnTouched() {
  turnTouched = true;
  let timer = document.getElementById('turnTimer');
  if (timer) timer.innerText = '';
}

function updateTurnTimer() {
  let timer = document.getElementById('turnTimer');
  if (!timer) return;
  if (gameState !== 'play' || turnTouched || selected) {
    timer.innerText = '';
    return;
  }
  let elapsed = activeRoomId && currentTurnStartedAt ? Date.now() - currentTurnStartedAt : millis() - turnStartedAt;
  let remaining = max(0, ceil((TURN_IDLE_LIMIT - elapsed) / 1000));
  timer.innerText = remaining;
  if (remaining <= 0 && canLocalControlTurn()) skipIdleTurn();
}

async function skipIdleTurn() {
  if (gameState !== 'play' || turnTouched || selected) return;
  selected = null;
  dragStart = null;
  if (activeRoomId && localPlayerId && location.protocol !== 'file:') {
    try {
      await fetch('/api/rooms/' + activeRoomId + '/flick', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ playerId: localPlayerId, stickIndex: -1, fx: 0, fy: 0, leverage: 0, axisOff: 0 })
      });
    } catch (err) {}
  }
}

// ── SERVER STATE APPLICATION ──────────────────────────────────────────────────
function applyServerState(serverSticks) {
  if (!serverSticks || !serverSticks.length) return;
  if (sticks.length !== serverSticks.length) {
    sticks = serverSticks.map(sd => createClientStick(sd));
  } else {
    serverSticks.forEach((sd, i) => updateClientStick(sticks[i], sd));
  }
  // Sync eliminated flags onto classicPlayers
  if (gameMode === 'classic' && roomState && roomState.eliminatedPlayerIds) {
    classicPlayers.forEach(p => {
      p.eliminated = roomState.eliminatedPlayerIds.includes(p.id);
    });
  }
  updateHUD();
}

function createClientStick(sd) {
  let classicPlayer = (sd.classicPlayerIdx >= 0 && classicPlayers[sd.classicPlayerIdx])
    ? classicPlayers[sd.classicPlayerIdx] : null;
  // Map server penType → client penIndex (PEN_FILES order: [3,4,5,2])
  let penIndex = sd.penType === 4 ? 1 : sd.penType === 5 ? 2 : sd.penType === 2 ? 3 : 0;
  let sp = refToScreen(sd.x, sd.y);
  let s = new Stick(sp.x, sp.y, sd.angle, sd.team, penIndex, classicPlayer);
  updateClientStick(s, sd);
  return s;
}

function updateClientStick(s, sd) {
  let sp = refToScreen(sd.x, sd.y);
  s.pos.x = sp.x; s.pos.y = sp.y;
  s.vel.x = (sd.vx || 0) * viewScale;
  s.vel.y = (sd.vy || 0) * viewScale;
  s.angle    = sd.angle    || 0;
  s.angVel   = sd.angVel   || 0;
  s.rollPhase = sd.rollPhase || s.rollPhase;
  s.rollVel  = sd.rollVel  || 0;
  s.gone     = !!sd.gone;
  s.fallT    = sd.fallT    || 0;
  s.fallDir  = createVector(sd.fallDirX || 0, sd.fallDirY || 1);
  s.calcEnds();
}

// ── SOUND ─────────────────────────────────────────────────────────────────────
function initSounds() {
  if (soundsReady || typeof p5 === 'undefined') return;
  if (typeof userStartAudio === 'function') userStartAudio();

  flickOsc = new p5.Oscillator('triangle');
  flickEnv = new p5.Envelope();
  flickEnv.setADSR(0.005, 0.08, 0.08, 0.08);
  flickEnv.setRange(0.16, 0);
  flickOsc.start(); flickOsc.amp(0);

  hitOsc = new p5.Oscillator('sine');
  hitEnv = new p5.Envelope();
  hitEnv.setADSR(0.001, 0.035, 0.02, 0.06);
  hitEnv.setRange(0.16, 0);
  hitOsc.start(); hitOsc.amp(0);

  hitNoise    = new p5.Noise('brown');
  hitNoiseEnv = new p5.Envelope();
  hitNoiseEnv.setADSR(0.001, 0.025, 0, 0.035);
  hitNoiseEnv.setRange(0.08, 0);
  hitNoise.start(); hitNoise.amp(0);

  soundsReady = true;
}

function playFlickSound(power) {
  initSounds();
  if (!soundsReady) return;
  let amp = constrain(map(power, 0, 1, 0.07, 0.2), 0.05, 0.2);
  flickOsc.freq(constrain(map(power, 0, 1, 280, 720), 260, 760));
  flickEnv.setRange(amp, 0);
  flickEnv.play(flickOsc, 0, 0.06);
}

function playHitSound(strength) {
  initSounds();
  if (!soundsReady || frameCount - lastHitSoundFrame < 4) return;
  lastHitSoundFrame = frameCount;
  let amp = constrain(map(strength, 0, 16, 0.035, 0.18), 0.03, 0.18);
  hitOsc.freq(constrain(map(strength, 0, 16, 170, 75), 65, 180));
  hitEnv.setRange(amp, 0);
  hitNoiseEnv.setRange(amp * 0.55, 0);
  hitEnv.play(hitOsc, 0, 0.035);
  hitNoiseEnv.play(hitNoise, 0, 0.02);
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function spawnParticles(x, y, dir, team) {
  let classicPlayer = classicPlayers.find(p => p.team === team);
  let col = classicPlayer ? classicPlayer.light : team === 'black' ? BLACK_LIGHT : BLUE_LIGHT;
  for (let i = 0; i < 12; i++) particles.push(new Particle(x, y, dir, col));
}

class Particle {
  constructor(x, y, dir, col) {
    this.pos  = createVector(x, y);
    let spd   = random(1.5, 5);
    let ang   = dir.heading() + random(-0.9, 0.9);
    this.vel  = createVector(cos(ang)*spd, sin(ang)*spd);
    this.life = 1; this.decay = random(0.04, 0.08);
    this.r    = random(2.5, 6); this.col = col;
  }
  update() { this.pos.add(this.vel); this.vel.mult(0.9); this.life -= this.decay; }
  show() {
    let c = color(this.col);
    noStroke(); fill(red(c), green(c), blue(c), this.life * 200);
    ellipse(this.pos.x, this.pos.y, this.r * this.life * 2.2);
  }
  dead() { return this.life <= 0; }
}

// ── OBSTACLE ──────────────────────────────────────────────────────────────────
class Obstacle {
  constructor(x, y, size) {
    this.x = x; this.y = y;
    this.size   = size;
    this.angle  = random(-0.15, 0.15);
    this.radius = size * 0.68;
  }
  show() {
    push();
    translate(this.x, this.y);
    rotate(this.angle);
    rectMode(CENTER); noStroke();
    fill(0, 0, 0, 45); rect(4, 5, this.size, this.size, 5);
    fill(92, 74, 58);  rect(0, 0, this.size, this.size, 5);
    fill(130, 104, 78); rect(-this.size*0.12, -this.size*0.18, this.size*0.62, this.size*0.46, 3);
    stroke(50, 40, 32, 90); strokeWeight(2); noFill();
    rect(0, 0, this.size, this.size, 5);
    pop();
  }
}

// ── STICK ─────────────────────────────────────────────────────────────────────
class Stick {
  constructor(x, y, angle, team, penIndex = 0, classicPlayer = null) {
    this.pos    = createVector(x, y);
    this.vel    = createVector(random(-0.2, 0.2), random(-0.1, 0.1));
    this.angle  = angle;
    this.angVel = random(-0.015, 0.015);
    this.team   = team;
    this.classicPlayer = classicPlayer;
    this.penFile = classicPlayer ? classicPlayer.file : PEN_FILES[team][penIndex % PEN_FILES[team].length];
    this.penType = Number(this.penFile.charAt(0));
    this.stats   = PEN_STATS[this.penType] || { mass: 1, friction: FRICTION };
    this.penImg  = classicPlayer ? classicImgs[classicPlayer.colorId] : penImgs[team][penIndex % penImgs[team].length];
    this.gone    = false;
    this.fallT   = 0;
    this.fallDir = createVector(0, 1);
    this.trail   = [];
    this.rollPhase = random(TWO_PI);
    this.rollVel   = 0;
    this.col      = classicPlayer ? classicPlayer.hex   : team === 'black' ? BLACK_COL   : BLUE_COL;
    this.colLight = classicPlayer ? classicPlayer.light : team === 'black' ? BLACK_LIGHT : BLUE_LIGHT;
    this.calcEnds();
  }

  calcEnds() {
    let hl = HALF_LEN * viewScale;
    let ca = cos(this.angle), sa = sin(this.angle);
    this.ax = this.pos.x + ca * hl; this.ay = this.pos.y + sa * hl;
    this.bx = this.pos.x - ca * hl; this.by = this.pos.y - sa * hl;
  }

  kick(force, leverage, axisOff) {
    this.vel.add(p5.Vector.div(force, this.stats.mass));
    let cross = force.x * sin(this.angle) - force.y * cos(this.angle);
    let tipFactor = pow(abs(axisOff), 1.35);
    this.angVel += (cross * (0.2 + abs(leverage))) / (HALF_LEN * 1.4 * this.stats.mass);
    this.angVel += axisOff * force.mag() * (0.0012 + tipFactor * 0.0032) / this.stats.mass;
    this.rollVel += axisOff * force.mag() * 0.018 / this.stats.mass;
  }

  updateTrail() {
    // Trail is client-side only for visual smoothness
    if (!this.gone && this.vel.mag() > 2) {
      this.trail.push(this.pos.copy());
      if (this.trail.length > 9) this.trail.shift();
    } else if (this.gone || this.vel.mag() <= 0.5) {
      if (this.trail.length) this.trail.shift();
    }
  }

  show() {
    if (this.gone && this.fallT >= 1) return;
    let sc        = viewScale;
    let hl        = HALF_LEN * sc, hw = HALF_W * sc;
    let pw        = PEN_DRAW_W * sc, ph = PEN_DRAW_H * sc;
    let spd       = this.vel.mag();
    let fallScale = this.gone ? max(0.04, 1 - this.fallT * 0.96) : 1;
    let fallAlpha = this.gone ? max(0, 255 * (1 - this.fallT))   : 255;
    let rollAmount = constrain(abs(this.rollVel) * 5, 0, 0.32);
    let rollSquash = 1 - rollAmount * (0.45 + 0.55 * abs(sin(this.rollPhase)));
    let rollLift   = sin(this.rollPhase) * rollAmount * 4 * sc;

    // Motion trail
    if (!this.gone && spd > 2) {
      for (let i = 0; i < this.trail.length; i++) {
        let alpha = map(i, 0, this.trail.length, 0, 30);
        push();
        translate(this.trail[i].x, this.trail[i].y);
        rotate(this.angle); rectMode(CENTER); noStroke();
        let c = color(this.col);
        fill(red(c), green(c), blue(c), alpha);
        rect(0, 0, hl*2, hw*2, hw);
        pop();
      }
    }

    let isActive   = !this.gone && this.team === currentTurn && !selected;
    let isSelected = selected === this;

    push();
    translate(this.pos.x, this.pos.y);
    rotate(this.angle);
    scale(fallScale);
    translate(0, rollLift);
    scale(1, rollSquash);
    imageMode(CENTER);
    rectMode(CENTER);

    // Shadow
    noStroke(); fill(0, 0, 0, 28 * (fallAlpha / 255));
    rect(4*sc, 6*sc, pw * 0.95, ph * 0.55, ph * 0.28);

    tint(255, fallAlpha);
    if (this.penImg) {
      image(this.penImg, 0, 0, pw, ph);
    } else {
      let c = color(this.col);
      fill(red(c), green(c), blue(c), fallAlpha);
      noStroke();
      rect(0, 0, hl*2, hw*2, hw);
    }
    noTint();
    pop();

    // Hover / selected glow
    if ((isActive && this.hit(mouseX, mouseY)) || isSelected) {
      push();
      translate(this.pos.x, this.pos.y);
      rotate(this.angle); rectMode(CENTER); noFill();
      stroke(255, 255, 255, isSelected ? 220 : 110);
      strokeWeight(isSelected ? 2.5 : 1.5);
      rect(0, 0, hl*2+12*sc, hw*2+10*sc, hw+4*sc);
      pop();
    }

    // Dim inactive team
    if (!this.gone && this.team !== currentTurn) {
      push();
      translate(this.pos.x, this.pos.y);
      rotate(this.angle); rectMode(CENTER);
      noStroke(); fill(32, 32, 32, 55);
      rect(0, 0, hl*2+8*sc, hw*2+8*sc, hw+3*sc);
      pop();
    }
  }

  hit(mx, my) {
    let hl = HALF_LEN * viewScale, hw = HALF_W * viewScale;
    let dx = mx - this.pos.x, dy = my - this.pos.y;
    let ca = cos(-this.angle), sa = sin(-this.angle);
    let lx = dx*ca - dy*sa, ly = dx*sa + dy*ca;
    return abs(lx) < hl+16*viewScale && abs(ly) < hw+10*viewScale;
  }
}

// ── GEOMETRY (client-side, used for obstacle placement) ───────────────────────
function ptSegDist(px,py,ax,ay,bx,by) {
  let dx=bx-ax, dy=by-ay, l2=dx*dx+dy*dy;
  if (l2===0) return dist(px,py,ax,ay);
  let t = constrain(((px-ax)*dx+(py-ay)*dy)/l2, 0, 1);
  return dist(px,py, ax+t*dx, ay+t*dy);
}

// ── HUD & GAME FLOW ───────────────────────────────────────────────────────────
function updateHUD() {
  if (gameMode === 'battle') {
    document.getElementById('scoreBlack').innerText = scores.black;
    document.getElementById('scoreBlue').innerText  = scores.blue;

    let isBlack = currentTurn === 'black';
    let blackName = getBattlePlayerName('black');
    let blueName = getBattlePlayerName('blue');
    document.getElementById('turnDot').style.background = isBlack ? '#555' : BLUE_COL;
    document.getElementById('turnText').innerText        = (isBlack ? blackName : blueName).toUpperCase() + "'S TURN";

    document.getElementById('panelBlack').classList.toggle('active-panel', isBlack);
    document.getElementById('panelBlue').classList.toggle('active-panel', !isBlack);
    pulseTurnBanner(isBlack ? BLACK_LIGHT : BLUE_LIGHT, currentTurn);
    return;
  }

  if (classicPlayers[classicTurnIndex] && classicPlayers[classicTurnIndex].eliminated) {
    let total = classicPlayers.length;
    let tries = 0;
    do {
      classicTurnIndex = (classicTurnIndex + 1) % total;
      tries++;
    } while (classicPlayers[classicTurnIndex].eliminated && tries < total);
    currentTurn = classicPlayers[classicTurnIndex] ? classicPlayers[classicTurnIndex].team : '';
    currentTurnPlayerId = classicPlayers[classicTurnIndex] ? classicPlayers[classicTurnIndex].id || '' : '';
  }
  let player = classicPlayers[classicTurnIndex];
  document.getElementById('turnDot').style.background = player ? player.hex : '#888';
  document.getElementById('turnText').innerText = player ? player.name.toUpperCase() + "'S TURN" : '';
  pulseTurnBanner(player ? player.light : '#888', player ? player.id || player.team : '');
  buildPlayerList();
}

function updateBattleScoreNames() {
  let blackName = document.getElementById('scoreNameBlack');
  let blueName = document.getElementById('scoreNameBlue');
  if (blackName) blackName.innerText = getBattlePlayerName('black').toUpperCase();
  if (blueName) blueName.innerText = getBattlePlayerName('blue').toUpperCase();
}

function getBattlePlayerName(team) {
  if (roomState && roomState.players && roomState.players.length) {
    let player = team === 'black' ? roomState.players[0] : roomState.players[1];
    if (player && player.name) return player.name;
  }
  return team === 'black' ? 'Black' : 'Blue';
}

function pulseTurnBanner(colorValue, key) {
  let banner = document.getElementById('turnBanner');
  if (!banner || !key || lastTurnPulseKey === key) return;
  lastTurnPulseKey = key;
  banner.style.setProperty('--turn-color', colorValue);
  banner.classList.remove('turn-pulse');
  void banner.offsetWidth;
  banner.classList.add('turn-pulse');
}


function checkPendingWin() {
  if (sticks.every(s => !s.gone || s.fallT >= 1))
    triggerWin(pendingWinner, pendingLeft);
}

function triggerWin(winner, leftCounts) {
  gameState = 'menu';
  document.getElementById('winTitle').innerText = winner==='DRAW' ? "IT'S A DRAW!" : winner + ' WINS!';
  if (gameMode === 'battle') {
    document.getElementById('winTitle').style.color =
      winner==='BLACK' ? BLACK_LIGHT : winner==='BLUE' ? BLUE_LIGHT : '#eee';
    document.getElementById('winMsg').innerText =
      `Pens left - Black: ${leftCounts.black}  Blue: ${leftCounts.blue}`;
  } else {
    let player = classicPlayers.find(p => p.name === winner);
    document.getElementById('winTitle').style.color = player ? player.light : '#eee';
    document.getElementById('winMsg').innerText = classicPlayers
      .map(p => `${p.name}: ${leftCounts[p.team] || 0} left`)
      .join('   ');
  }
  document.getElementById('winScreen').style.display = 'flex';
}

function startBattleGame() {
  gameMode = 'battle';
  document.body.classList.remove('classic-game');
  clearChat();
  initSounds();
  document.getElementById('menu').style.display    = 'none';
  document.getElementById('classicSetup').style.display = 'none';
  document.getElementById('hud').style.display     = 'flex';
  document.getElementById('hud').style.justifyContent = 'space-between';
  document.getElementById('panelBlack').style.display = 'flex';
  document.getElementById('panelBlue').style.display  = 'flex';
  document.getElementById('playerSidebar').style.display = 'none';
  document.getElementById('chatPanel').style.display = 'block';
  document.getElementById('resetBtn').style.display= 'block';
  if (isMobile()) document.getElementById('sidebarNewGameBtn').style.display = 'block';
  gameState = 'play';
  updateBattleScoreNames();
  initMobilePanels();
  initGame();
}

function startClassicGame(fromRoom = false) {
  gameMode = 'classic';
  document.body.classList.add('classic-game');
  clearChat();
  if (!fromRoom) {
    classicPlayers = classicSetupPlayers.map((p, i) => {
      let color = CLASSIC_COLORS.find(c => c.id === p.colorId) || CLASSIC_COLORS[i];
      return {
        team: 'classic' + i,
        name: (p.name || ('Player ' + (i + 1))).trim() || ('Player ' + (i + 1)),
        colorId: color.id,
        hex: color.hex,
        light: color.light,
        file: color.file,
        eliminated: false
      };
    });
  }
  initSounds();
  document.getElementById('menu').style.display = 'none';
  document.getElementById('classicSetup').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('hud').style.justifyContent = 'center';
  document.getElementById('panelBlack').style.display = 'none';
  document.getElementById('panelBlue').style.display  = 'none';
  document.getElementById('playerSidebar').style.display = 'block';
  document.getElementById('chatPanel').style.display = 'block';
  document.getElementById('resetBtn').style.display = 'block';
  if (isMobile()) document.getElementById('sidebarNewGameBtn').style.display = 'block';
  gameState = 'play';
  initMobilePanels();
  initGame();
}

async function resetGame() {
  document.getElementById('winScreen').style.display = 'none';
  gameState = 'play';
  clearChat();
  initGame();
  if (activeRoomId && localPlayerId && location.protocol !== 'file:') {
    try {
      let res = await fetch('/api/rooms/' + activeRoomId + '/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ playerId: localPlayerId })
      });
      let data = await res.json();
      if (data.sticks && data.sticks.length) applyServerState(data.sticks);
    } catch (err) {}
  }
}

function getCurrentChatPlayer() {
  if (myName) return { name: myName, color: myColor || '#eee' };
  if (gameMode === 'classic') {
    let player = classicPlayers[classicTurnIndex];
    if (player) return { name: player.name, color: player.light };
  }
  if (currentTurn === 'black') return { name: 'Black', color: BLACK_LIGHT };
  if (currentTurn === 'blue') return { name: 'Blue', color: BLUE_LIGHT };
  return { name: 'Player', color: '#eee' };
}

function handleChatKey(event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    sendChatMessage();
  }
}

function sendChatMessage() {
  let input = document.getElementById('chatInput');
  let text = input.value.trim();
  if (!text) return;
  let sender = getCurrentChatPlayer();
  input.value = '';
  publishRoomEvent('chat', {
    name: sender.name,
    color: sender.color,
    text
  });
}

function addChatMessage(msg) {
  chatMessages.push({
    name: msg.name || 'Player',
    color: msg.color || '#eee',
    text: msg.text || ''
  });
  if (chatMessages.length > 40) chatMessages.shift();
  renderChatMessages();
}

function renderChatMessages() {
  let box = document.getElementById('chatMessages');
  if (!box) return;
  box.innerHTML = '';
  chatMessages.forEach(msg => {
    let row = document.createElement('div');
    row.className = 'chat-message';

    let author = document.createElement('div');
    author.className = 'chat-author';
    author.style.color = msg.color;
    author.textContent = msg.name;

    let text = document.createElement('div');
    text.className = 'chat-text';
    text.textContent = msg.text;

    row.appendChild(author);
    row.appendChild(text);
    box.appendChild(row);
  });
  box.scrollTop = box.scrollHeight;
}

function clearChat() {
  chatMessages = [];
  renderChatMessages();
}

function sendReaction(emoji) {
  let sender = getCurrentChatPlayer();
  publishRoomEvent('reaction', {
    name: sender.name,
    color: sender.color,
    text: emoji
  });
}

function spawnFloatingReaction(emoji) {
  let layer = document.getElementById('reactionLayer');
  if (!layer) return;
  let el = document.createElement('div');
  el.className = 'floating-reaction';
  el.textContent = emoji;
  el.style.left = random(platX + platW * 0.2, platX + platW * 0.8) + 'px';
  el.style.top = random(platY + platH * 0.3, platY + platH * 0.75) + 'px';
  layer.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

function setupRoomChat() {
  if (location.protocol === 'file:' || typeof EventSource === 'undefined') return;
  let events = new EventSource('/events');
  events.addEventListener('open', () => { roomChatOnline = true; });
  events.addEventListener('history', event => {
    try {
      chatMessages = JSON.parse(event.data) || [];
      renderChatMessages();
    } catch (err) {}
  });
  events.addEventListener('chat', event => {
    try { addChatMessage(JSON.parse(event.data)); } catch (err) {}
  });
  events.addEventListener('reaction', event => {
    try {
      let msg = JSON.parse(event.data);
      addChatMessage(msg);
      spawnFloatingReaction(msg.text);
    } catch (err) {}
  });
  events.onerror = () => { roomChatOnline = false; };
}

async function publishRoomEvent(type, payload) {
  let path = type === 'reaction' ? '/reaction' : '/chat';
  if (location.protocol !== 'file:') {
    try {
      let eventPayload = Object.assign({}, payload, activeRoomId ? { roomId: activeRoomId } : {});
      let res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(eventPayload)
      });
      if (res.ok) return;
    } catch (err) {}
  }
  addChatMessage(payload);
  if (type === 'reaction') spawnFloatingReaction(payload.text);
}

function isMobile() { return window.innerWidth <= 700; }

function setPanelBackdrop(visible) {
  let bd = document.getElementById('panelBackdrop');
  if (bd) bd.classList.toggle('active', visible);
}

function closeChatPanel() {
  let panel = document.getElementById('chatPanel');
  let btn   = document.getElementById('chatToggleBtn');
  if (panel) panel.classList.add('mobile-hidden');
  if (btn)   { btn.classList.remove('panel-open'); btn.textContent = '💬'; }
}

function closePlayersPanel() {
  let panel = document.getElementById('playerSidebar');
  let btn   = document.getElementById('playersToggleBtn');
  if (panel) panel.classList.add('mobile-hidden');
  if (btn)   { btn.classList.remove('panel-open'); btn.textContent = '☰'; }
}

function closeAllPanels() {
  closeChatPanel();
  closePlayersPanel();
  setPanelBackdrop(false);
}

function toggleChatPanel() {
  if (!isMobile()) return;
  let panel = document.getElementById('chatPanel');
  let btn   = document.getElementById('chatToggleBtn');
  if (!panel || !btn) return;
  let willOpen = panel.classList.contains('mobile-hidden');
  if (willOpen) closePlayersPanel(); // only one panel at a time
  let hidden = panel.classList.toggle('mobile-hidden');
  btn.classList.toggle('panel-open', !hidden);
  btn.textContent = hidden ? '💬' : '✕';
  setPanelBackdrop(!hidden);
}

function togglePlayersPanel() {
  if (!isMobile()) return;
  let panel = document.getElementById('playerSidebar');
  let btn   = document.getElementById('playersToggleBtn');
  if (!panel || !btn) return;
  let willOpen = panel.classList.contains('mobile-hidden');
  if (willOpen) closeChatPanel(); // only one panel at a time
  let hidden = panel.classList.toggle('mobile-hidden');
  btn.classList.toggle('panel-open', !hidden);
  btn.textContent = hidden ? '☰' : '✕';
  setPanelBackdrop(!hidden);
}

function initMobilePanels() {
  if (!isMobile()) return;
  closeAllPanels();
}

function buildPlayerList() {
  let list = document.getElementById('playerList');
  list.innerHTML = '';
  classicPlayers.forEach((p, i) => {
    let left = sticks.filter(s => s.team === p.team && !s.gone).length;
    let row = document.createElement('div');
    row.className = 'player-list-row' +
      (i === classicTurnIndex && !p.eliminated ? ' active' : '') +
      (p.eliminated ? ' eliminated' : '');
    if (i === classicTurnIndex && !p.eliminated) row.style.borderLeftColor = p.hex;
    row.innerHTML = `<div class="player-dot" style="background:${p.hex}"></div>
      <div class="player-name">${p.name}</div>
      <div class="player-count">${left}</div>`;
    list.appendChild(row);
  });
}
</script>
